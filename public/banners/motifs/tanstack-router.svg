<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- route tree edges: root branches to three route segments -->
  <g fill="none" stroke-linecap="round">
    <path d="M160 200 C 206 200 202 108 248 108" stroke="#22d3ee" stroke-width="4" opacity="0.85"/>
    <path d="M160 200 L 248 200" stroke="#10b981" stroke-width="4.5" opacity="0.95"/>
    <path d="M160 200 C 206 200 202 292 248 292" stroke="#22d3ee" stroke-width="4" opacity="0.85"/>
  </g>

  <!-- connection handles -->
  <circle cx="160" cy="200" r="5.5" fill="#10b981"/>
  <circle cx="248" cy="108" r="4.5" fill="#22d3ee"/>
  <circle cx="248" cy="200" r="5" fill="#10b981"/>
  <circle cx="248" cy="292" r="4.5" fill="#22d3ee"/>

  <!-- root route node -->
  <rect x="64" y="170" width="96" height="60" rx="14" fill="#10b981" fill-opacity="0.16" stroke="#10b981" stroke-width="4"/>
  <!-- root slash glyph "/" -->
  <path d="M118 185 L100 215" stroke="#5eead4" stroke-width="6" stroke-linecap="round"/>

  <!-- child route: dynamic param -->
  <rect x="248" y="84" width="94" height="48" rx="12" fill="#22d3ee" fill-opacity="0.13" stroke="#22d3ee" stroke-width="3.5"/>
  <path d="M283 100 h24 M283 108 h24 M283 116 h16" stroke="#67e8f9" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <circle cx="270" cy="108" r="4" fill="#67e8f9"/>

  <!-- child route: active, type-safe check -->
  <rect x="248" y="176" width="94" height="48" rx="12" fill="#10b981" fill-opacity="0.22" stroke="#10b981" stroke-width="4"/>
  <path d="M278 200 l8 9 l17 -19" stroke="#6ee7b7" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- child route: nested -->
  <rect x="248" y="268" width="94" height="48" rx="12" fill="#22d3ee" fill-opacity="0.13" stroke="#22d3ee" stroke-width="3.5"/>
  <path d="M283 284 h24 M283 292 h24 M283 300 h16" stroke="#67e8f9" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <circle cx="270" cy="292" r="4" fill="#67e8f9"/>

  <!-- decorative scatter -->
  <g>
    <circle cx="52" cy="70" r="7" fill="#10b981" opacity="0.5"/>
    <circle cx="348" cy="340" r="7" fill="#22d3ee" opacity="0.5"/>
    <circle cx="356" cy="58" r="5" fill="#22d3ee" opacity="0.8"/>
    <circle cx="46" cy="328" r="5" fill="#10b981" opacity="0.75"/>
    <circle cx="34" cy="150" r="3.5" fill="#22d3ee" opacity="0.7"/>
    <circle cx="372" cy="204" r="3.5" fill="#10b981" opacity="0.65"/>
    <path d="M330 40 l3 7 l7 3 l-7 3 l-3 7 l-3-7 l-7-3 l7-3 Z" fill="#22d3ee" opacity="0.75"/>
    <path d="M58 356 l2.4 5.6 l5.6 2.4 l-5.6 2.4 l-2.4 5.6 l-2.4-5.6 l-5.6-2.4 l5.6-2.4 Z" fill="#10b981" opacity="0.7"/>
  </g>
</svg>
