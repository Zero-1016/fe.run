<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <style>
    .bg   { fill: #16161d; }
    .edge { stroke: #ffffff; }
    .node { fill: #ffffff; }
    .acc  { fill: #9d86ff; }
    @media (prefers-color-scheme: dark) {
      /* 다크 탭에서는 살짝 더 짙은 배경 + 동일 대비 유지 */
      .bg   { fill: #0e0e12; }
    }
  </style>
  <rect class="bg" width="64" height="64" rx="14"/>
  <g class="edge" stroke-width="3.2" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M20 32 L36 19"/>
    <path d="M20 32 L36 45"/>
  </g>
  <circle class="node" cx="20" cy="32" r="5"/>
  <circle class="acc"  cx="36" cy="19" r="5"/>
  <circle class="acc"  cx="36" cy="45" r="5"/>
</svg>
