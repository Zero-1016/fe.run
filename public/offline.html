<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>연결 없음</title>
    <style>
      :root {
        color-scheme: light dark;
        --surface: rgba(255, 255, 255, 0.72);
        --stroke: rgba(15, 23, 42, 0.08);
        --text: #0f172a;
        --muted: #64748b;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --glow1: rgba(37, 99, 235, 0.15);
        --glow2: rgba(99, 102, 241, 0.12);
        --page-bg: #f1f5f9;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --surface: rgba(15, 23, 42, 0.75);
          --stroke: rgba(148, 163, 184, 0.12);
          --text: #f1f5f9;
          --muted: #94a3b8;
          --accent: #60a5fa;
          --accent-hover: #93c5fd;
          --glow1: rgba(96, 165, 250, 0.12);
          --glow2: rgba(129, 140, 248, 0.1);
          --page-bg: #020617;
        }
      }
      * {
        box-sizing: border-box;
      }
      html {
        height: 100%;
        background: var(--page-bg);
      }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          sans-serif;
        color: var(--text);
        background: var(--page-bg);
        display: grid;
        place-items: center;
        padding: clamp(16px, 4vw, 40px);
        line-height: 1.65;
        word-break: keep-all;
        -webkit-font-smoothing: antialiased;
      }
      .bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(72px);
        opacity: 0.9;
        animation: drift 18s ease-in-out infinite;
      }
      .orb-a {
        width: min(52vw, 420px);
        height: min(52vw, 420px);
        background: var(--glow1);
        top: -12%;
        right: -8%;
        animation-delay: 0s;
      }
      .orb-b {
        width: min(48vw, 380px);
        height: min(48vw, 380px);
        background: var(--glow2);
        bottom: -18%;
        left: -12%;
        animation-delay: -7s;
      }
      @keyframes drift {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(-3%, 4%) scale(1.05);
        }
      }
      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 400px;
        padding: clamp(20px, 4.5vw, 36px);
        border-radius: 20px;
        background: var(--surface);
        border: 1px solid var(--stroke);
        box-shadow:
          0 1px 2px rgba(15, 23, 42, 0.04),
          0 24px 48px -12px rgba(15, 23, 42, 0.12);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        text-align: center;
      }
      @media (prefers-color-scheme: dark) {
        .card {
          box-shadow:
            0 1px 0 rgba(255, 255, 255, 0.04) inset,
            0 24px 48px -12px rgba(0, 0, 0, 0.45);
        }
      }
      .mark {
        width: 48px;
        height: 48px;
        margin: 0 auto 14px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(145deg, var(--glow1), transparent);
        border: 1px solid var(--stroke);
      }
      .mark svg {
        width: 24px;
        height: 24px;
        color: var(--accent);
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.2rem, 4vw, 1.4rem);
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 20px;
        font-size: 0.9375rem;
        color: var(--muted);
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      @media (min-width: 360px) {
        .actions {
          flex-direction: row;
          justify-content: center;
        }
      }
      .btn {
        flex: 1;
        min-width: 0;
        font: inherit;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        border-radius: 12px;
        padding: 12px 18px;
        text-decoration: none;
        text-align: center;
        border: 1px solid var(--stroke);
        background: transparent;
        color: var(--text);
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          color 0.15s ease;
      }
      .btn:hover {
        background: rgba(37, 99, 235, 0.06);
        border-color: rgba(37, 99, 235, 0.25);
      }
      @media (prefers-color-scheme: dark) {
        .btn:hover {
          background: rgba(96, 165, 250, 0.08);
          border-color: rgba(96, 165, 250, 0.3);
        }
      }
      .btn-primary {
        border-color: transparent;
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--accent-hover);
        border-color: transparent;
        color: #fff;
      }
      .hint {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--stroke);
        font-size: 0.75rem;
        color: var(--muted);
        line-height: 1.5;
      }
      .cached {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--stroke);
        text-align: left;
      }
      .cached-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        margin: 0 0 10px;
      }
      .cached-title {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0;
      }
      .cached-count {
        font-size: 0.7rem;
        font-feature-settings: "tnum";
        color: var(--muted);
      }
      .cached-scroll {
        position: relative;
        /* 카드 위 고정 영역(약 380px) + 외부 여백을 빼고 남는 만큼.
           min 140px 부터 max 280px 사이에서 뷰포트에 맞춰 자동 조절. */
        max-height: clamp(140px, calc(100dvh - 460px), 280px);
        overflow-y: auto;
        overscroll-behavior: contain;
        border-radius: 12px;
        border: 1px solid var(--stroke);
        background: rgba(15, 23, 42, 0.02);
      }
      @media (prefers-color-scheme: dark) {
        .cached-scroll {
          background: rgba(148, 163, 184, 0.04);
        }
      }
      .cached-scroll::-webkit-scrollbar {
        width: 8px;
      }
      .cached-scroll::-webkit-scrollbar-thumb {
        background: rgba(100, 116, 139, 0.3);
        border-radius: 8px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      .cached-scroll::-webkit-scrollbar-thumb:hover {
        background: rgba(100, 116, 139, 0.5);
        background-clip: padding-box;
        border: 2px solid transparent;
      }
      .cached-list {
        list-style: none;
        margin: 0;
        padding: 4px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .cached-list li a {
        display: block;
        padding: 8px 10px;
        border-radius: 8px;
        color: var(--text);
        text-decoration: none;
        border: 1px solid transparent;
        transition:
          background 0.15s ease,
          border-color 0.15s ease;
      }
      .cached-list li a:hover {
        background: rgba(37, 99, 235, 0.06);
        border-color: rgba(37, 99, 235, 0.18);
      }
      @media (prefers-color-scheme: dark) {
        .cached-list li a:hover {
          background: rgba(96, 165, 250, 0.08);
          border-color: rgba(96, 165, 250, 0.2);
        }
      }
      .cached-item-title {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.35;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .cached-item-desc {
        display: block;
        font-size: 0.75rem;
        line-height: 1.4;
        color: var(--muted);
        margin-top: 2px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .cached-empty {
        font-size: 0.8125rem;
        color: var(--muted);
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
    </div>
    <main class="card">
      <div class="mark" aria-hidden="true">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 20h.01" />
          <path d="M8.5 12.859a4 4 0 0 1 6.88-2.825" />
          <path d="M11.246 16.246a2 2 0 0 0 3.314-1.314" />
          <path d="M2 8.82a15 15 0 0 1 6.17-3.82" />
          <path d="M10.66 5c4.01.55 7.87 3.24 10.34 7.35" />
          <path d="m2 2 20 20" />
        </svg>
      </div>
      <h1>잠시 연결이 끊겼어요</h1>
      <p>
        네트워크가 돌아오면 새로고침해 보시거나, 한 번 온라인에서 열어두면 다음에는 여기서도 볼 수
        있어요.
      </p>
      <div class="actions">
        <button type="button" class="btn btn-primary" onclick="location.reload()">다시 시도</button>
        <a class="btn" href="/">홈으로</a>
      </div>
      <section class="cached" id="cached" hidden>
        <div class="cached-header">
          <h2 class="cached-title">저장된 페이지</h2>
          <span class="cached-count" id="cached-count"></span>
        </div>
        <p class="cached-empty" id="cached-empty">저장된 페이지를 찾는 중…</p>
        <div class="cached-scroll" id="cached-scroll" hidden>
          <ul class="cached-list" id="cached-list"></ul>
        </div>
      </section>
      <p class="hint">오프라인에서는 이미 방문한 페이지와 저장된 자산만 불러올 수 있어요.</p>
    </main>
    <script>
      (function () {
        if (!("caches" in window)) return;
        var section = document.getElementById("cached");
        var list = document.getElementById("cached-list");
        var scroll = document.getElementById("cached-scroll");
        var empty = document.getElementById("cached-empty");
        var countEl = document.getElementById("cached-count");
        if (!section || !list || !scroll || !empty || !countEl) return;
        section.hidden = false;

        var CONTENT_PREFIX = ["/posts/", "/tags/", "/series/"];

        function isContentPath(pathname) {
          if (!pathname) return false;
          for (var i = 0; i < CONTENT_PREFIX.length; i++) {
            if (pathname.indexOf(CONTENT_PREFIX[i]) === 0) return true;
          }
          return false;
        }

        var SUFFIX_RE = /\s+[|—–]\s+Tech Blog\s*$/;

        function stripSiteSuffix(raw) {
          if (!raw) return "";
          return raw.replace(SUFFIX_RE, "").trim();
        }

        function extractTitle(html) {
          var m = /<title[^>]*>([\s\S]*?)<\/title>/i.exec(html);
          if (!m) return "";
          return stripSiteSuffix(m[1].replace(/\s+/g, " "));
        }

        function decodeEntities(s) {
          return s
            .replace(/&amp;/g, "&")
            .replace(/&lt;/g, "<")
            .replace(/&gt;/g, ">")
            .replace(/&quot;/g, '"')
            .replace(/&#39;/g, "'");
        }

        function extractDescription(html) {
          var head = html.slice(0, 8000);
          var re = /<meta\s+[^>]*name=["']description["'][^>]*>/i;
          var tag = re.exec(head);
          if (!tag) {
            re = /<meta\s+[^>]*property=["']og:description["'][^>]*>/i;
            tag = re.exec(head);
          }
          if (!tag) return "";
          var content = /content=["']([\s\S]*?)["']/i.exec(tag[0]);
          if (!content) return "";
          return stripSiteSuffix(decodeEntities(content[1].replace(/\s+/g, " ").trim()));
        }

        async function collect() {
          var keys = await caches.keys();
          var origin = location.origin;
          var seen = Object.create(null);
          var items = [];
          for (var i = 0; i < keys.length; i++) {
            var cache = await caches.open(keys[i]);
            var requests = await cache.keys();
            for (var j = 0; j < requests.length; j++) {
              var req = requests[j];
              var url;
              try {
                url = new URL(req.url);
              } catch (e) {
                continue;
              }
              if (url.origin !== origin) continue;
              if (!isContentPath(url.pathname)) continue;
              if (seen[url.pathname]) continue;
              seen[url.pathname] = true;
              try {
                var res = await cache.match(req);
                if (!res) continue;
                var text = await res.clone().text();
                var title = extractTitle(text) || url.pathname;
                var description = extractDescription(text);
                items.push({ pathname: url.pathname, title: title, description: description });
              } catch (e) {
                /* ignore */
              }
            }
          }
          items.sort(function (a, b) {
            return a.title.localeCompare(b.title, "ko");
          });
          return items;
        }

        collect()
          .then(function (items) {
            if (items.length === 0) {
              empty.textContent =
                "아직 저장된 페이지가 없어요. 온라인에서 한 번 열어둔 페이지가 여기에 모입니다.";
              return;
            }
            empty.hidden = true;
            scroll.hidden = false;
            countEl.textContent = items.length + "개";
            for (var i = 0; i < items.length; i++) {
              var li = document.createElement("li");
              var a = document.createElement("a");
              a.href = items[i].pathname;
              var titleSpan = document.createElement("span");
              titleSpan.className = "cached-item-title";
              titleSpan.textContent = items[i].title;
              a.appendChild(titleSpan);
              if (items[i].description) {
                var descSpan = document.createElement("span");
                descSpan.className = "cached-item-desc";
                descSpan.textContent = items[i].description;
                a.appendChild(descSpan);
              }
              li.appendChild(a);
              list.appendChild(li);
            }
          })
          .catch(function () {
            empty.textContent = "저장된 페이지를 불러오지 못했어요.";
          });
      })();
    </script>
  </body>
</html>
