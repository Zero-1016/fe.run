<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>연결 없음</title>
    <style>
      :root {
        color-scheme: light dark;
        --surface: rgba(255, 255, 255, 0.72);
        --stroke: rgba(15, 23, 42, 0.08);
        --text: #0f172a;
        --muted: #64748b;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --glow1: rgba(37, 99, 235, 0.15);
        --glow2: rgba(99, 102, 241, 0.12);
        --page-bg: #f1f5f9;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --surface: rgba(15, 23, 42, 0.75);
          --stroke: rgba(148, 163, 184, 0.12);
          --text: #f1f5f9;
          --muted: #94a3b8;
          --accent: #60a5fa;
          --accent-hover: #93c5fd;
          --glow1: rgba(96, 165, 250, 0.12);
          --glow2: rgba(129, 140, 248, 0.1);
          --page-bg: #020617;
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        min-height: 100%;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          sans-serif;
        color: var(--text);
        background: var(--page-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(20px, 4vw, 40px);
        line-height: 1.65;
        word-break: keep-all;
        -webkit-font-smoothing: antialiased;
      }
      .bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(72px);
        opacity: 0.9;
        animation: drift 18s ease-in-out infinite;
      }
      .orb-a {
        width: min(52vw, 420px);
        height: min(52vw, 420px);
        background: var(--glow1);
        top: -12%;
        right: -8%;
        animation-delay: 0s;
      }
      .orb-b {
        width: min(48vw, 380px);
        height: min(48vw, 380px);
        background: var(--glow2);
        bottom: -18%;
        left: -12%;
        animation-delay: -7s;
      }
      @keyframes drift {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(-3%, 4%) scale(1.05);
        }
      }
      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 400px;
        padding: clamp(28px, 5vw, 36px);
        border-radius: 20px;
        background: var(--surface);
        border: 1px solid var(--stroke);
        box-shadow:
          0 1px 2px rgba(15, 23, 42, 0.04),
          0 24px 48px -12px rgba(15, 23, 42, 0.12);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        text-align: center;
      }
      @media (prefers-color-scheme: dark) {
        .card {
          box-shadow:
            0 1px 0 rgba(255, 255, 255, 0.04) inset,
            0 24px 48px -12px rgba(0, 0, 0, 0.45);
        }
      }
      .mark {
        width: 56px;
        height: 56px;
        margin: 0 auto 20px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(145deg, var(--glow1), transparent);
        border: 1px solid var(--stroke);
      }
      .mark svg {
        width: 28px;
        height: 28px;
        color: var(--accent);
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.25rem, 4vw, 1.4rem);
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 24px;
        font-size: 0.9375rem;
        color: var(--muted);
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      @media (min-width: 360px) {
        .actions {
          flex-direction: row;
          justify-content: center;
        }
      }
      .btn {
        flex: 1;
        min-width: 0;
        font: inherit;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        border-radius: 12px;
        padding: 12px 18px;
        text-decoration: none;
        text-align: center;
        border: 1px solid var(--stroke);
        background: transparent;
        color: var(--text);
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          color 0.15s ease;
      }
      .btn:hover {
        background: rgba(37, 99, 235, 0.06);
        border-color: rgba(37, 99, 235, 0.25);
      }
      @media (prefers-color-scheme: dark) {
        .btn:hover {
          background: rgba(96, 165, 250, 0.08);
          border-color: rgba(96, 165, 250, 0.3);
        }
      }
      .btn-primary {
        border-color: transparent;
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--accent-hover);
        border-color: transparent;
        color: #fff;
      }
      .hint {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--stroke);
        font-size: 0.75rem;
        color: var(--muted);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
    </div>
    <main class="card">
      <div class="mark" aria-hidden="true">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 20h.01" />
          <path d="M8.5 12.859a4 4 0 0 1 6.88-2.825" />
          <path d="M11.246 16.246a2 2 0 0 0 3.314-1.314" />
          <path d="M2 8.82a15 15 0 0 1 6.17-3.82" />
          <path d="M10.66 5c4.01.55 7.87 3.24 10.34 7.35" />
          <path d="m2 2 20 20" />
        </svg>
      </div>
      <h1>잠시 연결이 끊겼어요</h1>
      <p>
        네트워크가 돌아오면 새로고침해 보시거나, 한 번 온라인에서 열어두면 다음에는 여기서도 볼 수
        있어요.
      </p>
      <div class="actions">
        <button type="button" class="btn btn-primary" onclick="location.reload()">다시 시도</button>
        <a class="btn" href="/">홈으로</a>
      </div>
      <p class="hint">오프라인에서는 이미 방문한 페이지와 저장된 자산만 불러올 수 있어요.</p>
    </main>
  </body>
</html>
